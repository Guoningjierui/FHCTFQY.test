<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>方回春堂 - 养生茶包</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- 顶部导航 -->
  <header>
    <nav>
      <a href="index.html" class="logo">方回春堂</a>
      <div class="nav-links" id="navLinks">
        <!-- 导航链接将通过JS动态生成 -->
      </div>
      <div class="user-info" id="userInfo">
        <!-- 用户信息将通过JS动态生成 -->
      </div>
    </nav>
  </header>

  <!-- 页面标题 -->
  <section class="hero" style="height: 30vh;">
    <h1>养生茶包</h1>
    <p>精选天然草本，科学配比<br>让养生融入日常，健康每一天</p>
  </section>

  <!-- 产品列表 -->
  <section class="product-section">
    <div class="filter-tabs" id="teaFilterTabs">
      <!-- 筛选标签将通过JS动态生成 -->
    </div>
    <div class="product-grid" id="teaProductGrid">
      <!-- 产品卡片将通过JS动态生成 -->
    </div>
  </section>

  <!-- 页脚 -->
  <footer>
    <div class="footer-content">
      <div class="footer-section">
        <h3>关于方回春堂</h3>
        <p>方回春堂始创于1649年，是杭州著名的百年老字号。三百多年来，始终坚持"遵古炮制、选料道地"的传统，为百姓提供优质的中医药服务和养生佳品。</p>
      </div>
      <div class="footer-section">
        <h3>产品分类</h3>
        <ul>
          <li><a href="tea.html">养生茶包</a></li>
          <li><a href="ointment.html">传统膏方</a></li>
        </ul>
      </div>
      <div class="footer-section">
        <h3>联系我们</h3>
        <p>地址：杭州市上城区河坊街117号<br>电话：400-888-8888<br>营业时间：9:00-21:00</p>
      </div>
    </div>
    <div class="footer-bottom">
      <p>方回春堂 · 百年老字号 · 养生佳品</p>
    </div>
  </footer>

  <script src="products.js"></script>
  <script>
    let currentFilter = '全部';

    // 渲染导航栏
    function renderNav() {
      const navLinks = document.getElementById('navLinks');
      const userInfo = document.getElementById('userInfo');
      const session = getLoginSession();
      
      let navHtml = `
        <a href="index.html">首页</a>
        <a href="tea.html" class="active">茶包</a>
        <a href="ointment.html">膏方</a>
      `;
      
      // 只有管理员显示商品管理
      if (session && session.role === 'admin') {
        navHtml += '<a href="admin.html">商品管理</a>';
      }
      
      navLinks.innerHTML = navHtml;
      
      // 显示用户信息和退出按钮
      if (session) {
        userInfo.innerHTML = `
          <span>${session.role === 'admin' ? '管理员' : '达人'}: ${session.username}</span>
          <button class="btn-logout" onclick="logout()">退出</button>
        `;
      } else {
        userInfo.innerHTML = `
          <a href="login.html" class="login-link">登录</a>
        `;
      }
    }

    // 生成筛选标签
    function generateFilterTabs() {
      const categories = getTeaSubCategories();
      const tabs = document.getElementById('teaFilterTabs');
      tabs.innerHTML = '';
      
      categories.forEach(category => {
        const btn = document.createElement('button');
        btn.textContent = category;
        if (category === currentFilter) {
          btn.className = 'active';
        }
        btn.onclick = () => {
          currentFilter = category;
          updateFilterTabs();
          generateProductGrid();
        };
        tabs.appendChild(btn);
      });
    }

    // 更新筛选标签状态
    function updateFilterTabs() {
      const buttons = document.getElementById('teaFilterTabs').children;
      Array.from(buttons).forEach(btn => {
        if (btn.textContent === currentFilter) {
          btn.className = 'active';
        } else {
          btn.className = '';
        }
      });
    }

    // 生成产品网格
    function generateProductGrid() {
      const filteredProducts = filterTeaBySubCategory(currentFilter);
      const grid = document.getElementById('teaProductGrid');
      grid.innerHTML = '';
      
      if (filteredProducts.length === 0) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column: 1 / -1;">
            <p>暂无茶包产品，请先添加商品</p>
          </div>
        `;
        return;
      }
      
      filteredProducts.forEach(product => {
        const card = document.createElement('div');
        card.className = 'product-card';
        card.onclick = () => window.location.href = `product.html?id=${product.id}`;
        
        card.innerHTML = `
          <div class="product-image-wrapper">
            <img src="${product.image || getDefaultImage('tea')}" alt="${product.name}">
          </div>
          <div class="product-info">
            <div class="product-name">${product.name || '-'}</div>
            <div class="product-spec">${product.spec || '-'}</div>
            <div class="product-price">
              <span class="current-price">${product.price ? '¥' + product.price.toFixed(2) : '-'}</span>
              ${product.originalPrice ? `<span class="original-price">¥${product.originalPrice.toFixed(2)}</span>` : ''}
            </div>
          </div>
        `;
        
        grid.appendChild(card);
      });
    }

    // 获取默认图片
    function getDefaultImage(category) {
      if (category === 'tea') {
        return 'https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=Traditional%20Chinese%20herbal%20tea%20in%20elegant%20cup%20professional%20food%20photography&image_size=square';
      } else {
        return 'https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=Traditional%20Chinese%20medicine%20ointment%20paste%20in%20ceramic%20jar%20professional%20product%20photography&image_size=square';
      }
    }

    // 退出登录
    function logout() {
      clearLoginSession();
      window.location.href = 'login.html';
    }

    // 页面加载完成后执行
    document.addEventListener('DOMContentLoaded', () => {
      renderNav();
      generateFilterTabs();
      generateProductGrid();
    });
  </script>
</body>
</html>
