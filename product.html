<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>方回春堂 - 产品详情</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- 顶部导航 -->
  <header>
    <nav>
      <a href="index.html" class="logo">方回春堂</a>
      <div class="nav-links" id="navLinks">
        <!-- 导航链接将通过JS动态生成 -->
      </div>
      <div class="user-info" id="userInfo">
        <!-- 用户信息将通过JS动态生成 -->
      </div>
    </nav>
  </header>

  <!-- 产品详情 -->
  <div class="product-detail-container">
    <a href="javascript:history.back()" class="back-link">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 18l-6-6 6-6"/>
      </svg>
      返回
    </a>
    
    <div class="product-detail" id="productDetail">
      <!-- 产品详情将通过JS动态生成 -->
    </div>
  </div>

  <!-- 页脚 -->
  <footer>
    <div class="footer-content">
      <div class="footer-section">
        <h3>关于方回春堂</h3>
        <p>方回春堂始创于1649年，是杭州著名的百年老字号。三百多年来，始终坚持"遵古炮制、选料道地"的传统，为百姓提供优质的中医药服务和养生佳品。</p>
      </div>
      <div class="footer-section">
        <h3>产品分类</h3>
        <ul>
          <li><a href="tea.html">养生茶包</a></li>
          <li><a href="ointment.html">传统膏方</a></li>
        </ul>
      </div>
      <div class="footer-section">
        <h3>联系我们</h3>
        <p>地址：杭州市上城区河坊街117号<br>电话：400-888-8888<br>营业时间：9:00-21:00</p>
      </div>
    </div>
    <div class="footer-bottom">
      <p>方回春堂 · 百年老字号 · 养生佳品</p>
    </div>
  </footer>

  <script src="products.js"></script>
  <script>
    // 获取URL参数
    function getUrlParam(name) {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get(name);
    }

    // 渲染导航栏
    function renderNav() {
      const navLinks = document.getElementById('navLinks');
      const userInfo = document.getElementById('userInfo');
      const session = getLoginSession();
      
      let navHtml = `
        <a href="index.html">首页</a>
        <a href="tea.html">茶包</a>
        <a href="ointment.html">膏方</a>
      `;
      
      // 只有管理员显示商品管理
      if (session && session.role === 'admin') {
        navHtml += '<a href="admin.html">商品管理</a>';
      }
      
      navLinks.innerHTML = navHtml;
      
      // 显示用户信息和退出按钮
      if (session) {
        userInfo.innerHTML = `
          <span>${session.role === 'admin' ? '管理员' : '达人'}: ${session.username}</span>
          <button class="btn-logout" onclick="logout()">退出</button>
        `;
      } else {
        userInfo.innerHTML = `
          <a href="login.html" class="login-link">登录</a>
        `;
      }
    }

    // 生成产品详情
    function generateProductDetail() {
      const productId = getUrlParam('id');
      const product = getProductById(productId);
      const container = document.getElementById('productDetail');
      
      if (!product) {
        container.innerHTML = `
          <div style="text-align: center; padding: 2rem;">
            <h2>产品不存在</h2>
            <p><a href="index.html">返回首页</a></p>
          </div>
        `;
        return;
      }

      // 产品基础信息部分
      const basicInfoHtml = `
        <div class="detail-section">
          <h3>产品基础信息</h3>
          ${product.price ? `<div class="info-row"><span class="info-label">零售价</span><span class="info-value">¥${product.price.toFixed(2)}</span></div>` : ''}
          ${product.originalPrice ? `<div class="info-row"><span class="info-label">原价</span><span class="info-value">¥${product.originalPrice.toFixed(2)}</span></div>` : ''}
          ${product.spec ? `<div class="info-row"><span class="info-label">规格</span><span class="info-value">${product.spec}</span></div>` : ''}
          ${product.ingredients ? `<div class="info-row"><span class="info-label">配料</span><span class="info-value">${product.ingredients}</span></div>` : ''}
          ${product.expiry ? `<div class="info-row"><span class="info-label">保质期</span><span class="info-value">${product.expiry}</span></div>` : ''}
          ${product.usage ? `<div class="info-row"><span class="info-label">食用方法</span><span class="info-value">${product.usage}</span></div>` : ''}
          ${product.notSuitable ? `<div class="info-row"><span class="info-label">不适宜人群</span><span class="info-value">${product.notSuitable}</span></div>` : ''}
          ${product.suitable ? `<div class="info-row"><span class="info-label">适用人群</span><span class="info-value">${product.suitable}</span></div>` : ''}
        </div>
      `;

      // 产品卖点部分
      const featuresHtml = product.features && product.features.length > 0 ? `
        <div class="detail-section">
          <h3>产品卖点</h3>
          <ul class="features-list">
            ${product.features.map(f => `<li>${f}</li>`).join('')}
          </ul>
        </div>
      ` : '';

      container.innerHTML = `
        <div class="detail-image">
          <img src="${product.image || getDefaultImage(product.category)}" alt="${product.name}">
        </div>
        <div class="detail-info">
          <h2>${product.name}</h2>
          ${product.subCategory ? `<div class="spec"><strong>分类：</strong>${product.subCategory}</div>` : ''}
          
          ${basicInfoHtml}
          
          ${product.description ? `
            <div class="detail-section">
              <h3>产品介绍</h3>
              <div class="description">${product.description}</div>
            </div>
          ` : ''}
          
          ${featuresHtml}
        </div>
      `;

      // 更新页面标题
      document.title = `方回春堂 - ${product.name}`;
    }

    // 获取默认图片
    function getDefaultImage(category) {
      if (category === 'tea') {
        return 'https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=Traditional%20Chinese%20herbal%20tea%20in%20elegant%20cup%20professional%20food%20photography&image_size=square';
      } else {
        return 'https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=Traditional%20Chinese%20medicine%20ointment%20paste%20in%20ceramic%20jar%20professional%20product%20photography&image_size=square';
      }
    }

    // 退出登录
    function logout() {
      clearLoginSession();
      window.location.href = 'login.html';
    }

    // 页面加载完成后执行
    document.addEventListener('DOMContentLoaded', () => {
      renderNav();
      generateProductDetail();
    });
  </script>
</body>
</html>
